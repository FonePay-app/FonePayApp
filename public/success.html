<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — FonePay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 36px; height: 36px; fill: white; }
    h1 { font-size: 24px; color: #166534; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 15px; margin-bottom: 24px; }
    .detail {
      background: #f0fdf4;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-label { color: #6b7280; }
    .detail-value { color: #111827; font-weight: 500; }
    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
    }
    .fonepay-logo {
      margin-top: 24px;
      color: #9ca3af;
      font-size: 12px;
    }
    .fonepay-logo strong { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </div>
    <h1>Payment Successful</h1>
    <p>Your payment has been processed successfully via FonePay.</p>

    <div class="detail" id="details" style="display:none">
      <div class="detail-row" id="row-order" style="display:none">
        <span class="detail-label">Order ID</span>
        <span class="detail-value" id="orderId"></span>
      </div>
      <div class="detail-row" id="row-amount" style="display:none">
        <span class="detail-label">Amount Paid</span>
        <span class="detail-value" id="amount"></span>
      </div>
      <div class="detail-row" id="row-trace" style="display:none">
        <span class="detail-label">Trace ID</span>
        <span class="detail-value" id="traceId"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="badge">Confirmed</span>
      </div>
    </div>

    <div class="fonepay-logo">Powered by <strong>fone</strong>pay</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId');
    const amount = params.get('amount');
    const traceId = params.get('traceId');

    let hasDetails = false;

    if (orderId) {
      document.getElementById('orderId').textContent = orderId;
      document.getElementById('row-order').style.display = 'flex';
      hasDetails = true;
    }
    if (amount) {
      document.getElementById('amount').textContent = 'NPR ' + parseFloat(amount).toFixed(2);
      document.getElementById('row-amount').style.display = 'flex';
      hasDetails = true;
    }
    if (traceId) {
      document.getElementById('traceId').textContent = traceId;
      document.getElementById('row-trace').style.display = 'flex';
      hasDetails = true;
    }

    if (hasDetails) {
      document.getElementById('details').style.display = 'block';
    }

    // Modo instalación GHL
    if (params.get('installed') === 'true') {
      document.querySelector('h1').textContent = 'App Installed';
      document.querySelector('p').textContent = 'FonePay has been successfully connected to your GoHighLevel account.';
    }
  </script>
</body>
</html>
